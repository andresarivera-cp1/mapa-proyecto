<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mapa del proyecto</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    html,
    body {
      margin: 0;
      padding: 0;
      height: 100%;
    }

    .app {
      display: flex;
      min-height: 100vh;
    }

    .sidebar {
      width: 320px;
      min-width: 240px;
      padding: 20px;
      box-sizing: border-box;
      background: #ffffff;
      border-right: 1px solid #ccc;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .sidebar h1 {
      margin: 0;
      font-size: 1.4rem;
    }

    .sidebar p {
      margin: 0;
      line-height: 1.5;
    }

    .map-container {
      flex: 1;
      min-height: 100vh;
    }

    #map {
      width: 100%;
      height: 100%;
    }
  </style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <h1>Convenciones</h1>
    <p>Aquí puedes mostrar las reglas, los símbolos y las leyendas del mapa.</p>
    <ul>
      <li>Marcador principal: ubicación del bus</li>
      <li>Color verde: ruta activa</li>
      <li>Zoom: usa la rueda del ratón</li>
    </ul>
  </aside>

  <main class="map-container">
    <div id="map"></div>
  </main>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- SOLO ESTO -->
<script type="module" src="script.js?v=10"></script>

</body>
</html>
