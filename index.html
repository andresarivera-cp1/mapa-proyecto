<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mapa del proyecto</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- BANNER -->
  <header id="banner" aria-label="Banner Flow City">
    <img src="img/banner.jpg" alt="Banner Flow City">
  </header>

  <!-- CONTENIDO PRINCIPAL -->
  <main id="layout">

    <!-- SIDEBAR -->
    <aside id="sidebar">
      <div id="sidebar-content">
        <section class="sidebar-box">
          <h2>Convenciones</h2>
          <p>Iconos de rutas y significado.</p>
          <ul class="legend-list">
            <li>
              <img src="img/auto1.png" alt="Icono de ruta principal">
              <span>Transpubenza Ruta 2</span>
            </li>
            <li>
              <img src="img/auto2.png" alt="Icono de ruta secundaria">
              <span>Sotracauca Ruta 1</span>
            </li>
            <li>
              <img src="img/ico1.png" alt="Icono de Salud">
              <span>Facultad de Salud</span>
            </li>
            <li>
              <img src="img/ico2.png" alt="Icono de Contables">
              <span>Facultad de Contables</span>
            </li>
          </ul>
        </section>

        <section class="sidebar-box">
          <h2>Información</h2>
          <p>Usa los iconos para identificar las rutas en el mapa y el panel.</p>
        </section>
      </div>
    </aside>

    <!-- MAPA -->
    <div id="map">
      <button id="sidebar-toggle" aria-expanded="true" aria-label="Alternar barra lateral">◀</button>
      <div id="weather-card" class="weather-card" aria-live="polite">
        <div class="weather-card__header">Clima en Popayán</div>
        <div class="weather-card__body">
          <div class="weather-card__temp" id="weather-temp">--°C</div>
          <div class="weather-card__condition" id="weather-condition">Cargando...</div>
          <div class="weather-card__info">
            <span id="weather-wind">Viento -- km/h</span>
          </div>
        </div>
      </div>
    </div>

  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="script.js"></script>

</body>
</html>
